name: 宿舍电费每日检测

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-power:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: dorm_power_guard
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libxml2-dev libxslt-dev mysql-client
      - run: |
          cd backend
          pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt
      - name: 创建 .env
        run: |
          cd backend
          cat > .env << ENVEOF
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_USER=root
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=dorm_power_guard
          CRAWLER_BASE_URL=${{ vars.CRAWLER_BASE_URL }}
          CRAWLER_API_BASE_URL=${{ vars.CRAWLER_API_BASE_URL }}
          CRAWLER_OPENID=${{ secrets.CRAWLER_OPENID }}
          CRAWLER_DORM_NUMBER=${{ vars.CRAWLER_DORM_NUMBER }}
          CRAWLER_ROOM_ID=${{ secrets.CRAWLER_ROOM_ID }}
          CRAWLER_AREA_ID=${{ vars.CRAWLER_AREA_ID }}
          CRAWLER_YQ_ID=${{ vars.CRAWLER_YQ_ID }}
          CRAWLER_BUILDING_ID=${{ vars.CRAWLER_BUILDING_ID }}
          CRAWLER_FLOOR_ID=${{ vars.CRAWLER_FLOOR_ID }}
          CRAWLER_FACTORY_CODE=${{ vars.CRAWLER_FACTORY_CODE }}
          CRAWLER_SIGN=${{ vars.CRAWLER_SIGN }}
          CRAWLER_ORG_ID=${{ vars.CRAWLER_ORG_ID }}
          QQ_NOTIFY_API_KEY=${{ secrets.QQ_NOTIFY_API_KEY }}
          QQ_MSG_API_KEY=${{ secrets.QQ_MSG_API_KEY }}
          QQ_GROUP_ID=${{ vars.QQ_GROUP_ID }}
          DEFAULT_ALERT_THRESHOLD=10
          ENVEOF
      - name: 等待 MySQL 就绪
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u root -p"${{ secrets.DB_PASSWORD }}" --silent 2>/dev/null; then
              echo "MySQL ready"
              break
            fi
            sleep 2
          done
      - name: 执行电费检测
        run: |
          cd backend
          export $(grep -v '^#' .env | xargs)
          python run_ci.py
