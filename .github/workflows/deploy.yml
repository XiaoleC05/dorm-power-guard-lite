name: Deploy DormGuard

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-dormguard
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Pack release bundle
        run: |
          mkdir -p release/backend release/frontend-dist release/deploy
          rsync -a --delete \
            --exclude venv \
            --exclude __pycache__ \
            --exclude .env \
            backend/ release/backend/
          rsync -a --delete frontend/dist/ release/frontend-dist/
          rsync -a deploy/ release/deploy/
          chmod +x release/deploy/*.sh release/deploy/monitor/*.sh
          tar czf dormguard-release.tar.gz -C release .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: dormguard-release
          path: dormguard-release.tar.gz
          retention-days: 1

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: dormguard-release

      - name: Apply release on server
        run: |
          set -euo pipefail
          TARBALL="${GITHUB_WORKSPACE}/dormguard-release.tar.gz"
          if [ ! -f "$TARBALL" ]; then
            echo "错误：未找到 $TARBALL" >&2
            ls -la "${GITHUB_WORKSPACE}" >&2
            exit 1
          fi
          CI_SCRIPT="/opt/DormGuard/deploy/ci-deploy.sh"
          if [ ! -f "$CI_SCRIPT" ]; then
            WORK="/tmp/dormguard-release"
            rm -rf "$WORK"
            mkdir -p "$WORK"
            tar xzf "$TARBALL" -C "$WORK"
            sudo /usr/bin/bash "$WORK/deploy/apply-release.sh" "$WORK"
            rm -rf "$WORK" || true
          else
            sudo /usr/bin/bash "$CI_SCRIPT" "$TARBALL"
          fi
