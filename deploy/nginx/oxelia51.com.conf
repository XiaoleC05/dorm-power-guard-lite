server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name oxelia51.com www.oxelia51.com;

    ssl_certificate /etc/letsencrypt/live/oxelia51.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oxelia51.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/DormGuard/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_except GET POST PUT PATCH DELETE {
            deny all;
        }
    }

    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        allow 127.0.0.1;
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name oxelia51.com www.oxelia51.com;
    return 301 https://$host$request_uri;
}
